<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atelier métriques</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f8fb;
      color: #17202a;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 30px;
    }

    nav a {
      color: #1c4f82;
      font-weight: 700;
      text-decoration: none;
    }

    .hero {
      display: grid;
      gap: 18px;
      padding: 34px;
      background: #fff;
      border: 1px solid #dfe7f0;
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(23, 32, 42, 0.08);
    }

    h1 {
      margin: 0;
      font-size: 38px;
    }

    h2 {
      margin: 0;
      color: #536273;
      font-size: 21px;
      font-weight: 600;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .links a {
      display: block;
      padding: 16px;
      background: #fff;
      border: 1px solid #dfe7f0;
      border-radius: 8px;
      color: #17202a;
      font-weight: 700;
      text-decoration: none;
    }

    .links a:hover {
      border-color: #2f7fbd;
    }

    @media (max-width: 700px) {
      .links {
        grid-template-columns: 1fr;
      }

      .hero {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <main>
    <nav>
      <a href="/">Accueil</a>
      <a href="/contact">Contact</a>
      <a href="/rapport">Rapport</a>
      <a href="/histogramme">Histogramme</a>
      <a href="/atelier">Atelier</a>
    </nav>
    <section class="hero">
      <h1>Atelier métriques</h1>
      <h2>Nom Prénom : O. Baror</h2>
    </section>
    <section class="links">
      <a href="/contact">Page de contact</a>
      <a href="/paris">API Paris</a>
      <a href="/rapport">Graphique en courbe</a>
      <a href="/histogramme">Graphique en colonnes</a>
      <a href="/atelier">Indicateur atelier</a>
    </section>
  </main>
</body>
</html>
